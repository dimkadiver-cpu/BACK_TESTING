  :root {

  .ui-btn.q-btn {

    letter-spacing:0;

  .ui-btn-secondary.q-btn {

  .ui-btn-danger.q-btn {

  .q-field--filled .q-field__control,

  .q-btn.bg-primary {

    background:#79c0ff !important;

  .q-btn.q-btn--outline {
    background:transparent !important;

  (() => {
    const replacements = [
      ["Â· ", ""],
      ["â€”", "-"],
      ["â–¶ ", ""],
      ["â–  ", ""],
      ["âś“ ", ""],
      ["âś• ", ""],
      ["đź“„ ", ""],
      ["đź“‚ ", ""],
      ["đź“Š ", ""],
      ["đź“Ą ", ""],
      ["đź”— ", "SRC "],
      ["đź—„ ", "DB "],
      ["đź”‘", "KEY"],
      ["â„ą ", "INFO "],
      ["â†»", "Reload"],
      ["â¬‡ ", ""],
      ["â—Ź ", ""],
      ["â–ľ", "v"],
      ["â–¸", ">"],
      ["đź’ľ ", ""],
    ];
    const clean = (text) => replacements.reduce((acc, [from, to]) => acc.split(from).join(to), text);
    const walk = (root) => {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      for (const node of nodes) {
        const next = clean(node.nodeValue || "");
        if (next !== node.nodeValue) node.nodeValue = next;
      }
    };
    const run = () => walk(document.body);
    document.addEventListener("DOMContentLoaded", run);
    new MutationObserver(() => run()).observe(document.documentElement, {childList: true, subtree: true});
  })();
</script>

nsion","class":["nicegui-expansion","w-full"],"style":{"border":"1px solid var(--border-s)","border-radius":"var(--rs)","background":"var(--surface-2)"},"props":{"model-value":false,"loopback":true,"label":"Policy Studio","icon":"tune"},"children":[206,207,210,211],"events":[{"listener_id":"4b77a51a-f00c-4f8d-bfda-d595b8cdbadb","type":"update:modelValue","specials":[],"modifiers":[],"keys":[],"args":[null],"throttle":0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"206":{"tag":"div","text":"C:\\Back_Testing\\configs\\policies","class":["path-chip"]},"207":{"tag":"div","class":["nicegui-row","row","w-full","gap-4","items-end"],"children":[208,209]},"208":{"tag":"nicegui-select","class":["flex-1"],"props":{"model-value":{"value":0,"label":"original_chain"},"options":[{"value":0,"label":"original_chain"},{"value":1,"label":"policy_template_full"},{"value":2,"label":"signal_only"}],"loopback":true,"error":null,"label":"Policy editor"},"events":[{"listener_id":"633a4d4a-abcc-4207-80e6-5cc952cfe702","type":"update:modelValue","specials":[],"modifiers":[],"keys":[],"args":[null],"throttle":0,"leading_events":true,"trailing_events":true,"js_handler":null},{"listener_id":"27ea3ebd-d987-4904-82de-0e25a4b33fd4","type":"popupShow","specials":[],"modifiers":[],"keys":[],"args":null,"throttle":0.0,"leading_events":true,"trailing_events":true,"js_handler":null},{"listener_id":"e19cfaf1-56c5-4cbb-aff9-450c7391e1c0","type":"popupHide","specials":[],"modifiers":[],"keys":[],"args":null,"throttle":0.0,"leading_events":true,"trailing_events":true,"js_handler":null},{"listener_id":"6ea45144-0fcf-497f-8990-1461922624e6","type":"update:modelValue","specials":[],"modifiers":[],"keys":[],"args":null,"throttle":0.0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"209":{"tag":"nicegui-input","class":["flex-1","inp-mono"],"props":{"value":"","loopback":false,"error":null,"label":"Nuova policy","for":"c209","placeholder":"solo lettere, cifre, _ e -","type":"text","_autocomplete":[]},"events":[{"listener_id":"a5b71c7b-9a03-48dd-9d82-48a3fe6720e0","type":"update:value","specials":[],"modifiers":[],"keys":[],"args":[null],"throttle":0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"210":{"tag":"nicegui-input","class":["w-full","inp-mono"],"style":{"height":"320px","font-size":"12px","white-space":"pre"},"props":{"value":"# Template generale completo per policy Signal Chain Lab.\n#\n# Obiettivo:\n# - documentare il contratto YAML attuale\n# - restare caricabile dal PolicyLoader\n# - includere sia campi MVP sia estensioni gia' accettate dal modello\n\nname: original_chain\n\nentry:\n  # true  = usa la struttura entry originale della chain  \n  # false = lascia spazio a regole future di override\n  # Nota:\n  # il motore ora puo' costruire piu' EntryPlan da OPEN_SIGNAL quando il payload\n  # contiene abbastanza dettaglio su entries / entry_prices / entry_type.\n  use_original_entries: true\n\n  # Valori oggi presenti nello search space optimizer:\n  # - equal\n  # - front_loaded\n  # - back_loaded\n  #\n  # Semantica:\n  # - equal: distribuzione uniforme tra entry\n  # - front_loaded: piu' size sulle prime entry\n  # - back_loaded: piu' size sulle entry successive\n  entry_allocation: equal\n\n  # null = nessun limite esplicito sul numero di entry utilizzabili\n  max_entries_to_use: null\n\n  # Frazionamento entry per struttura canonica.\n  #\n  # Struttura canonica dispatch:\n  #   entry_structure = ONE_SHOT  + entry_type = MARKET  ? MARKET.single\n  #   entry_structure = ONE_SHOT  + entry_type = LIMIT   ? LIMIT.single\n  #   entry_structure = TWO_STEP  + primo leg market      ? MARKET.averaging\n  #   entry_structure = TWO_STEP  + primo leg limit       ? LIMIT.averaging\n  #   entry_structure = RANGE                             ? LIMIT.range\n  #   entry_structure = LADDER                            ? LIMIT.ladder\n  #\n  # Valori legacy entry_type (AVERAGING, ZONE) e entry_structure (SINGLE) sono\n  # accettati in input ma generano DeprecationWarning e vengono normalizzati\n  # automaticamente dal motore.\n  # I blocchi policy AVERAGING e ZONE sono deprecati: non aggiungerli in nuove policy.\n  entry_split:\n\n    LIMIT:\n      single:\n        weights:\n          E1: 1.0\n      range:\n        # split_mode: come trattare il range di prezzo (P1=basso, P2=alto).\n        #\n        # endpoints  ? 2 ordini limit (P1 e P2). Size distribuita con E1/E2 (weights qui sotto).\n        # firstpoint ? 1 ordine limit a P1 (piu' basso). Size 100%. Weights ignorati.\n        # lastpoint  ? 1 ordine limit a P2 (piu' alto).  Size 100%. Weights ignorati.\n        # midpoint   ? 1 ordine limit a (P1+P2)/2.       Size 100%. Weights ignorati.\n        #\n        # I weights E1/E2 si applicano SOLO con split_mode: endpoints.\n        split_mode: endpoints # endpoints | firstpoint | lastpoint | midpoint\n        weights:\n          E1: 0.50\n          E2: 0.50\n      averaging:\n        weights:\n          E1: 0.70\n          E2: 0.30\n      ladder:\n        weights:\n          E1: 0.50\n          E2: 0.30\n          E3: 0.20\n\n    MARKET:\n      single:\n        weights:\n          E1: 1.0\n      averaging:\n        weights:\n          E1: 0.70\n          E2: 0.30\n\n  allow_add_entry_updates: true   # true = consenti update ADD_ENTRY del trader\n\n\ntp:\n  # null = usa tutti i TP del segnale\n  # N    = usa solo i primi N TP (es: 2 = ignora TP3 e successivi)\n  use_tp_count: null\n\n  # Distribuzione della size sui livelli TP.\n  #\n  # mode: equal\n  #   Split uniforme tra N TP.\n  #   L'ultimo livello assorbe il resto floating-point ? somma sempre 1.0.\n  #   Esempio con 3 TP: [33.3%, 33.3%, 33.4%]\n  #\n  # mode: table\n  #   Usa la tabella esplicita sotto per N TP.\n  #   I valori non devono sommare a 100 — vengono normalizzati.\n  #   Se la riga per N manca ? warning + fallback equal.\n  close_distribution:\n    mode: table\n    table:\n      1: [100]\n      2: [50, 50]\n      3: [30, 30, 40]\n      4: [25, 25, 25, 25]\n      5: [20, 20, 20, 20, 20]\n      5: [20, 20, 20, 20, 20]\n    # Questa tabella non crea TP mancanti.\n    # Serve solo a distribuire la size di uscita sui TP gia' esistenti\n    # nella chain, per esempio quando i TP usati sono 2, 3 o 4.\n\nsl:\n  # true = conserva lo SL iniziale/originale\n  use_original_sl: true\n\n  # Engine auto-trigger break-even dopo hit di un TP specifico.\n  # null    = nessun BE automatico\n  # \"tp1\"   = muovi SL a BE dopo il primo TP parziale\n  # \"tp2\"   = muovi SL a BE dopo il secondo TP parziale\n  #\n  # Nota: il trader puo' sempre inviare MOVE_STOP con:\n  #   - prezzo esatto (es. 1234.56)\n  #   - None          ? BE implicito (avg_entry_price)\n  #   - \"tp1\" / \"tp2\" ? SL al livello del TP corrispondente\n  be_trigger: null\n\nupdates:\n  # Bootstrap MVP: flag semplici per filtrare gli update del trader.\n  apply_move_stop: true\n  apply_close_partial: true\n  apply_close_full: true\n  apply_cancel_pending: true\n  apply_add_entry: true\n\n  # Fallback 50% se il partial close non specifica bene la quota.\n  # Nota: questo campo e' parsed ma non ancora letto dall'engine.\n  # L'engine usa event.payload.get(\"close_pct\", 0.5) come fallback interno.\n  partial_close_fallback_pct: 0.5\n\npending:\n  # Timeout di un ordine pending non fillato.\n  pending_timeout_hours: 24\n\n  # Timeout massimo dell'intera chain.\n  chain_timeout_hours: 168\n\n  # true = allo scadere del pending_timeout_hours emette CANCEL_PENDING engine-driven.\n  # false = i pending rimangono attivi; chain_timeout_hours li chiude comunque.\n  cancel_pending_on_timeout: false\n\n  # Master switch per tutte le logiche di cancel engine TP-triggered (sotto).\n  # false = disabilita cancel_averaging_pending_after e cancel_unfilled_pending_after\n  #         indipendentemente dai loro valori.\n  # Non influenza cancel_pending_on_timeout (ha il suo flag separato).\n  cancel_pending_by_engine: false\n\n  # Cancella gli entry pending rimasti dopo il hit di un TP con open_size &gt; 0.\n  # Scenario: E1 fillato, E2 averaging ancora pending ? TP1 colpito ? cancella E2.\n  # null  = mai\n  # \"tp1\" = dopo il primo TP parziale\n  # \"tp2\" = dopo il secondo TP parziale\n  cancel_averaging_pending_after: null\n\n  # Cancella TUTTI i pending se il prezzo raggiunge un TP senza alcun fill (open_size == 0).\n  # Scenario: LIMIT a 100, prezzo sale a TP1 senza toccare 100 ? cancella tutto.\n  # null  = mai\n  # \"tp1\" = se TP1 raggiunto prima di qualsiasi fill\n  # \"tp2\" = se TP2 raggiunto prima di qualsiasi fill\n  cancel_unfilled_pending_after: null\n  # cancel_all_pending_after_break_even: false\n\n# risk: controlla il sizing e le metriche R/PnL% nel report.\n#\n# mode:\n#   none   ? simulatore gira, metriche R/PnL% assenti nel report (default)\n#   fixed  ? usa sempre risk_pct sotto, ignora risk_percent dal segnale\n#   signal ? usa risk_percent dal segnale se presente, fallback a risk_pct\n#            se il segnale ha solo un hint qualitativo (U_RISK_NOTE senza valore),\n#            usa reduced_risk_pct invece di risk_pct\n#\n# risk_pct: obbligatorio se mode=fixed o mode=signal\n# reduced_risk_pct: opzionale, usato solo con mode=signal per hint qualitativi\nrisk:\n  mode: fixed \n  risk_pct: 1.0\n  # reduced_risk_pct: 0.5\n\nexecution:\n  # Usato da latency_model.py / fill_model.py\n  latency_ms: 0\n\n  # Modello slippage applicato ai market order.\n  # Valori supportati:\n  #   none      ? nessuno slippage (default)\n  #   fixed_bps ? sposta il fill price di slippage_bps basis points in direzione avversa\n  #               (LONG paga di piů, SHORT riceve di meno)\n  # Nota: i limit order non sono soggetti a slippage (fill al prezzo esatto del limite).\n  slippage_model: none\n\n  # Usato solo con slippage_model: fixed_bps\n  # 1 bps = 0.01%; es: 5 bps = 0.05% di slippage avverso sui market order\n  slippage_bps: 0\n\n  # Placeholder contrattuale per il modello di fill touch-based.\n  fill_touch_guaranteed: true\n\n  # Modello fee applicato a ogni fill (entry e close TP/SL).\n  # Valori supportati:\n  #   none      ? nessuna fee (default)\n  #   fixed_bps ? fee = price * qty * fee_bps / 10_000 per lato\n  #               Esempio: fee_bps=5 = 0.05% per lato (entry + exit separati)\n  fee_model: none\n\n  # Usato solo con fee_model: fixed_bps\n  fee_bps: 0.0\n  maker_fee_bps: null\n  taker_fee_bps: null\n\n  # Modello funding rate per futures perpetui.\n  # none       ? nessun funding applicato (default)\n  # historical ? usa i dati storici scaricati da Bybit (PRD: docs/PRD_funding_model.md)\n  funding_model: none\n  funding_apply_to_pnl: true   # se false: calcola e logga ma non deduce dal PnL\n\n  # Estensioni possibili:\n  # partial_fill_model: none   # design: docs/DESIGN_partial_fill_model.md\n  # spread_model: none\n","loopback":false,"error":null,"for":"c210","type":"textarea","_autocomplete":[]},"events":[{"listener_id":"68f2be79-d026-461a-b727-d1afcd3bd019","type":"update:value","specials":[],"modifiers":[],"keys":[],"args":[null],"throttle":0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"211":{"tag":"div","class":["nicegui-row","row","gap-2","q-mt-sm"],"children":[212,213,214,215]},"212":{"tag":"q-btn","props":{"color":"primary","label":"Salva","dense":true,"outline":true},"events":[{"listener_id":"032fdb8b-5b84-40ab-9ecb-388c58dc70c8","type":"click","specials":[],"modifiers":[],"keys":[],"args":[],"throttle":0.0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"213":{"tag":"q-btn","props":{"color":"primary","label":"Salva come nuova","dense":true,"outline":true},"events":[{"listener_id":"1088a59e-0462-4949-a04c-a26294198046","type":"click","specials":[],"modifiers":[],"keys":[],"args":[],"throttle":0.0,"leading_events":true,"trailing_events":true,"js_handler":null}]},"214":{"tag":"q-btn","props":{"color":"primary","label":"Nuova policy","dense":true,"outline":true},"events":[{"listener_id":"94618b7
