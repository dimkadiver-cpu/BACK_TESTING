# Template MVP minimale per policy Signal Chain Lab.
#
# Scopo:
# - fornire una base semplice e subito usabile
# - includere solo i campi principali del contratto attuale
# - evitare le estensioni future o piu' complesse
#
# Nota:
# - il simulatore oggi usa davvero soprattutto timeout e latency
# - gli altri flag restano comunque utili per mantenere coerenza tra policy

name: policy_template_mvp

entry:
  # true = usa la struttura entry gia' presente nella chain
  # (entry singola, multi-entry, averaging) quando disponibile
  use_original_entries: true

  # Fallback semplice di allocazione.
  # Valori noti:
  # - equal
  # - front_loaded
  # - back_loaded
  #
  # Nota:
  # la logica reale ora puo' anche usare entry_split quando il payload contiene
  # piu' entry esplicite; questo campo resta il fallback generale di alto livello.
  entry_allocation: equal
  max_entries_to_use: null

  # Config minima per casi multi-entry.
  # Il motore puo' applicarla quando OPEN_SIGNAL contiene abbastanza dettaglio
  # (per esempio entry_structure ONE_SHOT, TWO_STEP, RANGE, LADDER).
  entry_split:

    LIMIT:
      single:
        weights:
          E1: 1.0
      range:
        # split_mode: come trattare il range di prezzo (P1=basso, P2=alto).
        #
        # endpoints  → 2 ordini limit (P1 e P2). Size distribuita con E1/E2 (weights qui sotto).
        # firstpoint → 1 ordine limit a P1 (piu' basso). Size 100%. Weights ignorati.
        # lastpoint  → 1 ordine limit a P2 (piu' alto).  Size 100%. Weights ignorati.
        # midpoint   → 1 ordine limit a (P1+P2)/2.       Size 100%. Weights ignorati.
        #
        # I weights E1/E2 si applicano SOLO con split_mode: endpoints.
        split_mode: endpoints # endpoints | firstpoint | lastpoint | midpoint
        weights:
          E1: 0.50
          E2: 0.50
      averaging:
        weights:
          E1: 0.70
          E2: 0.30
      ladder:
        weights:
          E1: 0.50
          E2: 0.30
          E3: 0.20

    MARKET:
      single:
        weights:
          E1: 1.0
      averaging:
        weights:
          E1: 0.70
          E2: 0.30

  allow_add_entry_updates: true

tp:
  use_tp_count: null
  close_distribution:
    mode: table
    table:
      1: [100]
      2: [50, 50]
      3: [30, 30, 40]
      4: [25, 25, 25, 25]

sl:
  use_original_sl: true
  be_trigger: null

updates:
  apply_move_stop: true
  apply_close_partial: true
  apply_close_full: true
  apply_cancel_pending: true
  apply_add_entry: true
  partial_close_fallback_pct: 0.5

pending:
  pending_timeout_hours: 24
  chain_timeout_hours: 168
  cancel_pending_on_timeout: true
  cancel_pending_by_engine: true
  cancel_averaging_pending_after: null
  cancel_unfilled_pending_after: null

# mode: none | fixed | signal
# risk_pct obbligatorio se mode != none
risk:
  mode: none
  # risk_pct: 1.0
  # reduced_risk_pct: 0.5

execution:
  latency_ms: 0
  # none | fixed_bps
  slippage_model: none
  # Usato solo con slippage_model: fixed_bps (es: 5 = 0.05% di slippage avverso)
  slippage_bps: 0
  fill_touch_guaranteed: true
